<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#06112B" />
    <meta
      name="description"
      content="SDIRS — Stolen Device Identification & Recovery System · Malawi MACRA"
    />

    <!-- Google Fonts: Syne (display) + Inter (body) + DM Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="theme-color" content="#06112B" />
    <meta
      name="description"
      content="SDIRS — Stolen Device Identification and Recovery System. Malawi's national device registry and theft intelligence platform."
    />
    <title>SDIRS · Malawi</title>
    <!-- Set theme before React loads to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('sidrs_state_v3');
          var theme = s ? JSON.parse(s)?.state?.theme : 'dark';
          document.documentElement.setAttribute('data-theme', theme || 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <!-- React mounts here -->
    <div id="root"></div>
  </body>
</html>
